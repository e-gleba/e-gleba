name: generate_github_profile_3d_stats

on:
  schedule:
    - cron: "0 18 * * *" # daily at 18:00 UTC
  workflow_dispatch:

# least-privilege: only what's needed
permissions:
  contents: write # push generated SVGs

# prevent overlapping runs from cron + manual trigger
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Generate 3D contribution stats

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" \
                           || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .
          git commit -m "chore: regenerate 3D contribution stats [skip ci]"
          git push
